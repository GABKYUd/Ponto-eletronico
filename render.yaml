services:
  # Backend Node API
  - type: web
    name: ponto-backend
    env: node
    region: ohio
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ponto-postgres
          property: connectionString
      - key: VITE_API_URL
        fromService:
          type: web
          name: ponto-backend
          property: host
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false # Set this securely in your Render dashboard
      - key: NODE_ENV
        value: production

  # Frontend React SPA
  - type: web
    name: ponto-frontend
    env: static
    region: ohio
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ponto-backend
          property: host
databases:
  # Managed PostgreSQL Instance
  - name: ponto-postgres
    region: ohio
    plan: free # Change to a paid tier for production
